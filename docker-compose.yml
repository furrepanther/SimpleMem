services:
  simplemem:
    container_name: simplemem
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - simplemem_data:/app/MCP/data
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/MCP/data
      - LANCEDB_PATH=/app/MCP/data/lancedb
      - USER_DB_PATH=/app/MCP/data/users.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-4.1-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - ENABLE_RERANKING=${ENABLE_RERANKING:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health') || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
